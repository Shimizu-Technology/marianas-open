<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Marianas Open</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07111f;
      color: #e0ddd8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    img { width: 80px; height: 80px; margin-bottom: 1.5rem; opacity: 0.8; }
    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.75rem; }
    p { font-size: 0.95rem; color: #9a978f; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      padding: 0.75rem 2rem;
      background: rgba(212, 168, 67, 0.15);
      color: #d4a843;
      border: 1px solid rgba(212, 168, 67, 0.3);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(212, 168, 67, 0.25); }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/logos/mo-logo-white.png" alt="Marianas Open" />
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
